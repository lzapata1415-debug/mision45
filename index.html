<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión 45: La Odisea del Cacique Francisco</title>
    <link rel="stylesheet" href="style.css?v=28">
    <style>
        #countdown-screen { text-align: center; padding: 20px; background: #fff; min-height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Ajuste de espacio entre Banner y Título */
        .portal-header { margin-bottom: 40px; } 
        .banner-cemi { width: 100%; max-width: 1200px; height: auto; border-bottom: 4px solid #ce1126; }
        
        .titulo-espera { 
            margin-top: 50px; /* Aquí corregimos que no esté pegado al logo */
            color: #002d62; 
            font-size: 1.8em; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-box { display: flex; justify-content: center; gap: 15px; margin: 40px 0; }
        .timer-unit { background: #002d62; color: white; padding: 15px 10px; border-radius: 12px; min-width: 80px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .timer-num { font-size: 2em; font-weight: bold; display: block; line-height: 1; }
        .timer-label { font-size: 0.7em; text-transform: uppercase; opacity: 0.8; }

        /* Botón Secreto para la Guaca */
        .btn-secreto {
            margin-top: 60px;
            background: none;
            border: 1px solid #eee;
            color: #ccc;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.8em;
            border-radius: 20px;
            transition: 0.3s;
        }
        .btn-secreto:hover { color: #ce1126; border-color: #ce1126; }
    </style>
</head>
<body>

<div id="countdown-screen">
    <div class="portal-header">
        <img src="banner_final_cacique.jpg" alt="Portal Sagrado" class="banner-cemi">
    </div>
    
    <div class="container">
        <h2 class="titulo-espera">Preparando el 45.º Sol</h2>
        <p style="color:#666; font-size:1em; margin-top: 10px;">Cacique Francisco, el portal se abrirá en:</p>
        
        <div class="timer-box">
            <div class="timer-unit"><span class="timer-num" id="days">00</span><span class="timer-label">Días</span></div>
            <div class="timer-unit"><span class="timer-num" id="hours">00</span><span class="timer-label">Horas</span></div>
            <div class="timer-unit"><span class="timer-num" id="mins">00</span><span class="timer-label">Min</span></div>
            <div class="timer-unit"><span class="timer-num" id="secs">00</span><span class="timer-label">Seg</span></div>
        </div>

        <p style="color: #999; font-style: italic; max-width: 500px; margin: 0 auto;">"La paciencia es la virtud de los grandes líderes."</p>

        <button class="btn-secreto" onclick="saltarContador()">Acceso Privado: Ver Misión Completa</button>
    </div>
</div>

<div id="main-mission" style="display: none;">
    <header>
         <img src="banner_final_cacique.jpg" alt="Misión 45" class="banner-cemi">
         <h1>Misión 45: El Areyto del Cacique</h1>
    </header>
    </div>

<script>
    const FECHA_OBJETIVO = new Date("April 2, 2026 00:00:00").getTime();

    function actualizarReloj() {
        const ahora = new Date().getTime();
        const distancia = FECHA_OBJETIVO - ahora;

        if (distancia < 0) {
            saltarContador();
            return;
        }

        document.getElementById("days").innerText = Math.floor(distancia / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        document.getElementById("hours").innerText = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById("mins").innerText = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        document.getElementById("secs").innerText = Math.floor((distancia % (1000 * 60)) / 1000).toString().padStart(2, '0');
    }

    // FUNCIÓN PARA VER LA MISIÓN SIN ESPERAR
    function saltarContador() {
        document.getElementById("countdown-screen").style.display = "none";
        document.getElementById("main-mission").style.display = "block";
    }

    setInterval(actualizarReloj, 1000);
    window.onload = actualizarReloj;
</script>

</body>
</html>
